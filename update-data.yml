name: Actualizar datos de expansión

on:
  schedule:
    # Cada lunes a las 7:00 AM hora Colombia (UTC-5 = 12:00 UTC)
    - cron: "0 12 * * 1"
  workflow_dispatch: # permite correrlo manualmente desde GitHub

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Actualizar data.json desde Linear
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: node scripts/fetch-linear.js

      - name: Commit y push si hay cambios
        run: |
          git config user.name "Dapper Bot"
          git config user.email "bot@dapperglobal.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: actualizar datos de expansión $(date +'%Y-%m-%d')"
          git push
